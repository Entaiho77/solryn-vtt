# Auto-deploy to Firebase Hosting (live channel) on every push to main.
name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # The Firebase web config is baked into the bundle at build time, so CI must have
      # these (public, client-safe) values — otherwise the deployed app renders but auth/db
      # are dead. Stored as GitHub repo secrets. Do NOT set VITE_USE_FIREBASE_EMULATOR here.
      - run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      # Deploy the Realtime Database security rules BEFORE hosting, so the live rules always cover
      # the client about to ship (a new client that writes a field the old rules reject would be
      # denied). Reuses the SAME service account as the hosting deploy below — no new secret —
      # authenticating firebase-tools via GOOGLE_APPLICATION_CREDENTIALS. If this step fails the
      # job stops here (default step fail-fast), so hosting is never deployed on top of stale rules.
      - name: Deploy database rules
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"
          GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json" \
            npx --yes firebase-tools@latest deploy --only database \
              --project solryn-virtual-table-top --non-interactive
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SOLRYN_VIRTUAL_TABLE_TOP }}
          FIREBASE_DATABASE_URL: https://solryn-virtual-table-top-default-rtdb.firebaseio.com
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SOLRYN_VIRTUAL_TABLE_TOP }}
          channelId: live
          projectId: solryn-virtual-table-top
          # Same recent CLI as the preview workflow, for consistency. (The live deploy is a
          # production release, not a preview-channel release, so it isn't subject to the
          # channel "already active version" precondition either way.)
          firebaseToolsVersion: latest
